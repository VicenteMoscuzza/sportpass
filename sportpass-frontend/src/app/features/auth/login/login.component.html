<div class="auth-container">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>🎟️ SportPass</mat-card-title>
        <mat-card-subtitle>Iniciá sesión en tu cuenta</mat-card-subtitle>
      </mat-card-header>
  
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" placeholder="tu@email.com">
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contraseña</mat-label>
            <input matInput formControlName="password" type="password">
          </mat-form-field>
  
          <p class="error" *ngIf="error">{{ error }}</p>
  
          <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loading">
            {{ loading ? 'Ingresando...' : 'Ingresar' }}
          </button>
        </form>
      </mat-card-content>
  
      <mat-card-actions>
        <p>¿No tenés cuenta? <a routerLink="/auth/register">Registrate</a></p>
      </mat-card-actions>
    </mat-card>
  </div>
