<div class="auth-wrap">

  <div class="brand">
    <span class="brand-icon">⬡</span>
    <span class="brand-name">SportPass</span>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h1>Crear cuenta</h1>
      <p>Completá tus datos para registrarte</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Nombre</label>
        <input
          formControlName="nombre"
          type="text"
          placeholder="Tu nombre"
          [class.invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
      </div>

      <div class="field">
        <label>Email</label>
        <input
          formControlName="email"
          type="email"
          placeholder="tu@email.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          formControlName="password"
          type="password"
          placeholder="Mínimo 6 caracteres"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched">
      </div>

      <p class="error-msg" *ngIf="error">{{ error }}</p>

      <div class="field">
        <label>Confirmar contraseña</label>
        <input
          formControlName="confirmPassword"
          type="password"
          placeholder="Repetí tu contraseña"
          [class.invalid]="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.touched">
        <span class="field-error" *ngIf="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.touched">
          Las contraseñas no coinciden
        </span>
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Registrarse</span>
        <span *ngIf="loading" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
      </button>

    </form>

    <div class="card-footer">
      ¿Ya tenés cuenta?
      <a routerLink="/auth/login">Iniciá sesión</a>
    </div>
  </div>

</div>
