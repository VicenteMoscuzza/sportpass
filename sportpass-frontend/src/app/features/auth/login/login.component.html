<div class="auth-wrap">

  <div class="brand">
    <span class="brand-icon">⬡</span>
    <span class="brand-name">SportPass</span>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h1>Bienvenido</h1>
      <p>Ingresá a tu cuenta para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Email</label>
        <input
          formControlName="email"
          type="email"
          placeholder="tu@email.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched">
      </div>

      <p class="error-msg" *ngIf="error">{{ error }}</p>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
      </button>

    </form>

    <div class="card-footer">
      ¿No tenés cuenta?
      <a routerLink="/auth/register">Registrate</a>
    </div>
  </div>

</div>
